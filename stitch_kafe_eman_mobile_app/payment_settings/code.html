<script>
        // Simple script to handle toggle visual states if needed beyond CSS
        document.querySelectorAll('.toggle-checkbox').forEach(toggle => {
            toggle.addEventListener('change', function() {
                const label = this.nextElementSibling;
                if(this.checked) {
                    this.style.right = '0';
                    this.style.left = 'auto';
                    this.style.borderColor = '#3e2723'; // primary-container
                    label.style.backgroundColor = '#3e2723';
                } else {
                    this.style.left = '0';
                    this.style.right = 'auto';
                    this.style.borderColor = '#d3c3c0'; // outline-variant
                    label.style.backgroundColor = '#e2e2e2'; // surface-variant
                }
            });
        });
    </script>
