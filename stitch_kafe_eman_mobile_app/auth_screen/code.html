<style>
        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border-top: 1px solid rgba(255, 255, 255, 0.4);
            border-left: 1px solid rgba(255, 255, 255, 0.2);

        }
        .btn-press {
            transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1);

<!-- Suppressed TopAppBar and BottomNavBar as this is a transactional Auth screen -->
<!-- Top Half: Hero Image -->
<div class="relative flex-1 w-full h-[486px]">
<div class="absolute inset-0 bg-cover bg-center w-full h-full" data-alt="A high-resolution, close-up photograph of a slow, perfect pour of rich espresso into a ceramic cup. The scene captures the golden crema forming, with delicate swirls of steam rising. The lighting is warm and dramatic, highlighting the deep amber and dark brown tones of the coffee against a softly blurred background. The overall mood is premium, artisanal, and inviting, perfectly capturing the essence of a high-end coffee shop experience." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuANoa6ZcdyiTO4ljjg4kxR5KKcBo_9eJcGd5Z_gQ7VRcoYw9xU0ev6FSDZebA2jOUTubX9Wk7pS1ubZg4MyDWoTN8OG4I567_L0ZeGW0HBOuwaYqO0xLP7RMRyE3uBS6U0ZOiKngG5-Rc73rZpi36ZQKE7ZTS094SdXGmU5KucyOWVVX7P8QpdW2yroYpclMz0-dlEp2yMfp6073UJ1w6C2AIDrzFGrIwS2JUw_nDrVfgAw-e_1Xej4Jp23cA18GTzqzRPb-jbV3dus')">
</div>
<!-- Gradient Overlay for smooth transition -->
<div class="absolute inset-x-0 bottom-0 h-32 bg-gradient-to-t from-background/40 to-transparent"></div>
</div>
<!-- Bottom Half: Liquid Glass Panel -->
<div class="glass-panel relative flex-none h-[397px] rounded-t-[32px] -mt-6 z-10 flex flex-col justify-between px-container-margin py-stack-lg shadow-[0px_8px_24px_rgba(62,39,35,0.05)]">
<!-- Header Content -->
<div class="flex flex-col gap-stack-sm text-center">
<h1 class="font-headline-md text-headline-md text-primary tracking-tight">
                Elevate your coffee experience
            </h1>
<p class="font-body-md text-body-md text-secondary">
                Join the Kafe Eman community for exclusive rewards and seamless ordering.
            </p>
</div>
<!-- Actions Container -->
<div class="flex flex-col gap-stack-md w-full max-w-sm mx-auto">
<!-- Primary Button (Deep Roast) -->
<button class="btn-press w-full bg-primary-container text-on-primary rounded-full py-3 font-label-md text-label-md flex items-center justify-center shadow-sm">
                Sign Up
            </button>
<!-- Secondary Button (Outline) -->
<button class="btn-press w-full bg-transparent border-2 border-outline text-primary rounded-full py-3 font-label-md text-label-md flex items-center justify-center">
                Login
            </button>
<!-- Social Button (Apple) -->
<button class="btn-press w-full bg-inverse-surface text-inverse-on-surface rounded-full py-3 font-label-md text-label-md flex items-center justify-center gap-2">
<!-- Using generic apple-like icon approach since Material doesn't have an exact Apple logo -->
<svg class="w-5 h-5" fill="currentColor" viewbox="0 0 24 24">
<path d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.15 2.95.92 3.78 2.29-3.23 1.94-2.68 6.35.6 7.62-.75 1.5-1.57 2.58-2.98 3.1z"></path>
<path d="M12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z"></path>
</svg>

            </button>
</div>
<!-- Guest Link -->
<div class="text-center mt-stack-sm">
<button class="btn-press font-label-md text-label-md text-secondary hover:text-primary transition-colors py-2">
                Continue as Guest
            </button>
</div>
