<script>
        document.addEventListener('DOMContentLoaded', () => {
            const boxes = document.querySelectorAll('.otp-box');
            const keys = document.querySelectorAll('.keypad-btn');
            let currentIndex = 0;

            function updateActiveState() {
                boxes.forEach((box, index) => {
                    if (index === currentIndex) {
                        box.classList.add('input-active');
                    } else {
                        box.classList.remove('input-active');
                    }
                });
            }

            keys.forEach(key => {
                key.addEventListener('click', (e) => {
                    const val = e.currentTarget.getAttribute('data-val');
                    
                    if (val === 'backspace') {
                        if (currentIndex > 0) {
                            if (boxes[currentIndex].textContent === '') {
                                currentIndex--;
                            }
                            boxes[currentIndex].textContent = '';
                            updateActiveState();
                        } else if (currentIndex === 0) {
                             boxes[currentIndex].textContent = '';
                        }
                    } else {
                        if (currentIndex < boxes.length) {
                            boxes[currentIndex].textContent = val;
                            if (currentIndex < boxes.length - 1) {
                                currentIndex++;
                                updateActiveState();
                            } else {
                                
                                boxes.forEach(b => b.classList.remove('input-active'));
                                boxes[boxes.length - 1].classList.add('border-primary/30');
                            }
                        }
                    }
                    
                    if ('vibrate' in navigator) {
                        navigator.vibrate(10);
                    }
                });
            });
        });
    </script>
