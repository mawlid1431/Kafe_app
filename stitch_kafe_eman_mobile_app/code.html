<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Kafe Eman - Sign Up</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&amp;family=Playfair+Display:wght@600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "secondary-container": "#ece0dc",
                    "on-error-container": "#93000a",
                    "inverse-surface": "#2f3131",
                    "tertiary-fixed": "#ffdeac",
                    "primary-fixed": "#ffdad4",
                    "on-secondary-fixed": "#201a18",
                    "tertiary-container": "#3e2900",
                    "primary-container": "#3e2723",
                    "on-tertiary": "#ffffff",
                    "outline-variant": "#d3c3c0",
                    "surface-container-lowest": "#ffffff",
                    "on-tertiary-container": "#c48900",
                    "surface-container-low": "#f3f3f3",
                    "on-primary-container": "#ae8d87",
                    "surface-container-high": "#e8e8e8",
                    "on-error": "#ffffff",
                    "on-secondary-container": "#6b6360",
                    "on-tertiary-fixed": "#281900",
                    "inverse-on-surface": "#f1f1f1",
                    "on-secondary": "#ffffff",
                    "on-primary-fixed-variant": "#5b403c",
                    "tertiary-fixed-dim": "#ffba38",
                    "surface": "#f9f9f9",
                    "on-secondary-fixed-variant": "#4c4542",
                    "error": "#ba1a1a",
                    "outline": "#827472",
                    "error-container": "#ffdad6",
                    "surface-bright": "#f9f9f9",
                    "surface-dim": "#dadada",
                    "on-tertiary-fixed-variant": "#604100",
                    "surface-container-highest": "#e2e2e2",
                    "surface-tint": "#745853",
                    "secondary-fixed": "#ece0dc",
                    "tertiary": "#241600",
                    "primary-fixed-dim": "#e3beb8",
                    "on-surface": "#1a1c1c",
                    "primary": "#271310",
                    "inverse-primary": "#e3beb8",
                    "on-background": "#1a1c1c",
                    "on-primary-fixed": "#2b1613",
                    "secondary": "#655d5a",
                    "background": "#f9f9f9",
                    "surface-variant": "#e2e2e2",
                    "secondary-fixed-dim": "#cfc4c0",
                    "surface-container": "#eeeeee",
                    "on-primary": "#ffffff",
                    "on-surface-variant": "#504442"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "stack-lg": "32px",
                    "section-gap": "48px",
                    "stack-md": "16px",
                    "unit": "8px",
                    "stack-sm": "8px",
                    "gutter": "16px",
                    "container-margin": "24px"
            },
            "fontFamily": {
                    "caption": ["Inter"],
                    "headline-md": ["Playfair Display"],
                    "display-lg-mobile": ["Playfair Display"],
                    "body-md": ["Inter"],
                    "label-md": ["Inter"],
                    "display-lg": ["Playfair Display"],
                    "body-lg": ["Inter"]
            },
            "fontSize": {
                    "caption": ["12px", {"lineHeight": "16px", "fontWeight": "400"}],
                    "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
                    "display-lg-mobile": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "700"}],

                    "label-md": ["14px", {"lineHeight": "20px", "letterSpacing": "0.05em", "fontWeight": "600"}],
                    "display-lg": ["48px", {"lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                    "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}]
            }
          }
        }
      }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen flex flex-col relative overflow-x-hidden">
<!-- Ambient Background -->
<div class="fixed inset-0 pointer-events-none z-[-1] overflow-hidden">
<div class="absolute top-[-10%] left-[-10%] w-[50vw] h-[50vw] rounded-full bg-primary-fixed opacity-20 blur-[100px]"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[60vw] h-[60vw] rounded-full bg-secondary-fixed opacity-30 blur-[120px]"></div>
</div>
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-surface/70 backdrop-blur-xl border-b border-white/20 shadow-[0px_8px_24px_rgba(62,39,35,0.05)]">
<div class="flex justify-between items-center px-container-margin py-stack-md w-full">
<button class="text-primary hover:bg-white/10 transition-colors active:scale-95 duration-200 w-10 h-10 flex items-center justify-center rounded-full">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="font-display-lg-mobile text-display-lg-mobile text-primary tracking-tight">Sign Up</h1>
<div class="w-10 h-10"></div> <!-- Spacer for centering -->
</div>
</header>
<!-- Main Content -->
<main class="flex-grow pt-28 pb-container-margin px-container-margin flex flex-col items-center">
<div class="w-full max-w-md flex flex-col gap-stack-lg">
<!-- Header Text -->
<div class="text-center space-y-stack-sm">
<h2 class="font-headline-md text-headline-md text-primary">Create Account</h2>
<p class="font-body-md text-body-md text-on-surface-variant">Enter your details to get started.</p>
</div>
<!-- Form -->
<form class="flex flex-col gap-stack-md">
<!-- Full Name -->
<div class="flex flex-col gap-unit">
<label class="font-label-md text-label-md text-on-surface" for="fullName">Full Name</label>
<div class="relative bg-surface-container-lowest/70 backdrop-blur-[40px] border border-white/20 shadow-[inset_0_2px_4px_rgba(62,39,35,0.02),0_8px_24px_rgba(62,39,35,0.05)] rounded-[16px] overflow-hidden transition-all duration-300 focus-within:ring-2 focus-within:ring-primary/20">
<input class="w-full bg-transparent border-none py-3 px-4 font-body-md text-body-md text-on-surface placeholder:text-outline focus:ring-0" id="fullName" placeholder="John Doe" type="text"/>
</div>
</div>
<!-- Email -->
<div class="flex flex-col gap-unit">
<label class="font-label-md text-label-md text-on-surface" for="email">Email</label>
<div class="relative bg-surface-container-lowest/70 backdrop-blur-[40px] border border-white/20 shadow-[inset_0_2px_4px_rgba(62,39,35,0.02),0_8px_24px_rgba(62,39,35,0.05)] rounded-[16px] overflow-hidden transition-all duration-300 focus-within:ring-2 focus-within:ring-primary/20">
<input class="w-full bg-transparent border-none py-3 px-4 font-body-md text-body-md text-on-surface placeholder:text-outline focus:ring-0" id="email" placeholder="john@example.com" type="email"/>
</div>
</div>
<!-- Password -->
<div class="flex flex-col gap-unit">
<label class="font-label-md text-label-md text-on-surface" for="password">Password</label>
<div class="relative bg-surface-container-lowest/70 backdrop-blur-[40px] border border-white/20 shadow-[inset_0_2px_4px_rgba(62,39,35,0.02),0_8px_24px_rgba(62,39,35,0.05)] rounded-[16px] overflow-hidden transition-all duration-300 focus-within:ring-2 focus-within:ring-primary/20">
<input class="w-full bg-transparent border-none py-3 px-4 font-body-md text-body-md text-on-surface placeholder:text-outline focus:ring-0" id="password" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined" style="font-size: 20px;">visibility_off</span>
</button>
</div>
</div>
<!-- Confirm Password -->
<div class="flex flex-col gap-unit">
<label class="font-label-md text-label-md text-on-surface" for="confirmPassword">Confirm Password</label>
<div class="relative bg-surface-container-lowest/70 backdrop-blur-[40px] border border-white/20 shadow-[inset_0_2px_4px_rgba(62,39,35,0.02),0_8px_24px_rgba(62,39,35,0.05)] rounded-[16px] overflow-hidden transition-all duration-300 focus-within:ring-2 focus-within:ring-primary/20">
<input class="w-full bg-transparent border-none py-3 px-4 font-body-md text-body-md text-on-surface placeholder:text-outline focus:ring-0" id="confirmPassword" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined" style="font-size: 20px;">visibility_off</span>
</button>
</div>
</div>
<!-- Terms Checkbox -->
<div class="flex items-start gap-3 mt-2">
<div class="relative flex items-center mt-1">
<input class="peer w-5 h-5 rounded-[6px] border-outline text-primary focus:ring-primary/20 bg-surface-container-lowest/70 backdrop-blur-[40px] shadow-[inset_0_2px_4px_rgba(62,39,35,0.02)] transition-all cursor-pointer" id="terms" type="checkbox"/>
</div>
<label class="font-body-md text-body-md text-on-surface-variant cursor-pointer text-sm" for="terms">
                        I agree to the <a class="text-primary font-medium hover:underline" href="#">Terms</a> &amp; <a class="text-primary font-medium hover:underline" href="#">Privacy Policy</a>.
                    </label>
</div>
<!-- Primary Action Button -->
<button class="mt-stack-md w-full bg-primary text-on-primary py-4 rounded-full font-label-md text-label-md shadow-[0_8px_24px_rgba(62,39,35,0.2)] hover:bg-primary-fixed hover:text-on-primary-fixed transition-all duration-200 active:scale-[0.98]" type="button">
                    Create Account
                </button>
</form>
<!-- Footer Login Link -->
<div class="text-center mt-stack-md">
<p class="font-body-md text-body-md text-on-surface-variant">
                    Already have an account? <a class="text-primary font-semibold hover:underline" href="#">Login</a>
</p>
</div>
</div>
</main>
</body></html>
