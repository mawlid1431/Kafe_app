<!-- Script to handle the custom date picker placeholder logic for better UX -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const dateInput = document.querySelector('input[type="date"]');
            const placeholder = dateInput.nextElementSibling;
            
            dateInput.addEventListener('change', (e) => {
                if (e.target.value) {
                    dateInput.classList.remove('text-transparent');
                    dateInput.classList.add('text-on-surface');
                    placeholder.style.display = 'none';
                } else {
                    dateInput.classList.add('text-transparent');
                    dateInput.classList.remove('text-on-surface');
                    placeholder.style.display = 'flex';
                }
            });
        });
    </script>
